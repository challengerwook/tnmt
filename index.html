            { classNo: "13", num: "26", name: "조수아", gender: "여" },
            { classNo: "13", num: "27", name: "조현우", gender: "남" },
            { classNo: "13", num: "28", name: "최지훈", gender: "남" },
            { classNo: "13", num: "29", name: "한나율", gender: "여" },
            { classNo: "13", num: "30", name: "황동준", gender: "남" }
        ];

        // 2. Local State
        let currentClass = "1";
        let currentGender = "남";

        // DOM Elements
        const classSelect = document.getElementById('class-select');
        const absenteeContainer = document.getElementById('absentee-container');
        const outputSection = document.getElementById('output-section');
        const printTitle = document.getElementById('print-title');
        const printParticipants = document.getElementById('print-participants');
        const bracketStatSummary = document.getElementById('bracket-stat-summary');
        const bracketVisualizationContainer = document.getElementById('bracket-visualization-container');

        // Initial setup
        window.onload = function() {
            // Set Default Date in Korean Style
            const today = new Date();
            document.getElementById('print-date').innerText = `작성일: ${today.getFullYear()}년 ${String(today.getMonth() + 1).padStart(2, '0')}월 ${String(today.getDate()).padStart(2, '0')}일`;
            
            // Generate Class Select options 1 to 13
            classSelect.innerHTML = "";
            for(let i = 1; i <= 13; i++) {
                const option = document.createElement('option');
                option.value = String(i);
                option.innerText = `${i}반`;
                classSelect.appendChild(option);
            }
            
            lucide.createIcons();
            renderStudentsAndAbsentees();
        };

        // Select Class dropdown controller
        function changeClass(classNo) {
            currentClass = classNo;
            renderStudentsAndAbsentees();
        }

        // Select Gender UI control
        function selectGender(gender) {
            currentGender = gender;
            const btnM = document.getElementById('gender-m-btn');
            const btnF = document.getElementById('gender-f-btn');

            if (gender === '남') {
                btnM.className = "py-3 px-4 rounded-xl border-2 text-sm font-bold transition-all text-center focus:outline-none bg-blue-50 border-blue-600 text-blue-700";
                btnF.className = "py-3 px-4 rounded-xl border-2 text-sm font-bold transition-all text-center focus:outline-none bg-white border-slate-200 text-slate-600 hover:border-slate-300";
            } else {
                btnF.className = "py-3 px-4 rounded-xl border-2 text-sm font-bold transition-all text-center focus:outline-none bg-pink-50 border-pink-600 text-pink-700";
                btnM.className = "py-3 px-4 rounded-xl border-2 text-sm font-bold transition-all text-center focus:outline-none bg-white border-slate-200 text-slate-600 hover:border-slate-300";
            }
            renderStudentsAndAbsentees();
        }

        // Render Student checkboxes
        function renderStudentsAndAbsentees() {
            const filtered = studentDatabase.filter(s => s.classNo === currentClass && s.gender === currentGender);
            
            absenteeContainer.innerHTML = "";

            if (filtered.length === 0) {
                absenteeContainer.innerHTML = `<p class="text-slate-400 text-center py-6 text-sm">해당 조건에 해당하는 학생이 명단에 없습니다.</p>`;
                return;
            }

            // Grid Layout
            const grid = document.createElement('div');
            grid.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3";

            filtered.sort((a,b) => parseInt(a.num) - parseInt(b.num)).forEach(student => {
                const label = document.createElement('label');
                label.className = "flex items-center space-x-2.5 p-3 bg-white rounded-xl border border-slate-200 hover:border-indigo-300 cursor-pointer transition-all select-none text-xs font-semibold shadow-sm";
                
                const checkbox = document.createElement('input');
                checkbox.type = "checkbox";
                checkbox.value = `${student.classNo}-${student.num}-${student.name}`;
                checkbox.className = "w-4.5 h-4.5 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500 cursor-pointer";
                
                checkbox.addEventListener('change', () => {
                    if (checkbox.checked) {
                        label.classList.add('border-red-400', 'bg-red-50/50', 'text-red-700');
                    } else {
                        label.classList.remove('border-red-400', 'bg-red-50/50', 'text-red-700');
                    }
                });

                const infoText = document.createElement('span');
                infoText.innerText = `${student.num}번 ${student.name}`;

                label.appendChild(checkbox);
                label.appendChild(infoText);
                grid.appendChild(label);
            });

            absenteeContainer.appendChild(grid);
        }

        // Reset all absentees
        function clearAllAbsentees() {
            const checkBoxes = absenteeContainer.querySelectorAll('input[type="checkbox"]');
            checkBoxes.forEach(cb => {
                cb.checked = false;
                const label = cb.closest('label');
                if (label) label.classList.remove('border-red-400', 'bg-red-50/50', 'text-red-700');
            });
        }

        // Build Tournament Main Logic
        function buildTournament() {
            const studentsInGroup = studentDatabase.filter(s => s.classNo === currentClass && s.gender === currentGender);
            
            // Gather Checked Absentees keys
            const absentList = Array.from(absenteeContainer.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
            
            // Actual participants
            const participants = studentsInGroup.filter(student => {
                const uniqueKey = `${student.classNo}-${student.num}-${student.name}`;
                return !absentList.includes(uniqueKey);
            });

            if (participants.length < 2) {
                alert("토너먼트를 생성하기 위해서는 오늘 수업에 최소 2명 이상의 학생이 출전해야 합니다.");
                return;
            }

            // Shuffle (Fisher-Yates) to randomize match position
            const shuffled = [...participants];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            // Power of 2 (capacity size)
            const count = shuffled.length;
            let bracketSize = 2;
            while (bracketSize < count) {
                bracketSize *= 2;
            }

            // Bye (부전승) Count
            const byeCount = bracketSize - count;

            // Distribute Players and BYEs
            const distributedPlayers = distributePlayersAndByes(shuffled, bracketSize, byeCount);

            // Display Output
            outputSection.classList.remove('hidden');
            printTitle.innerText = `${currentClass}반 배드민턴 토너먼트 대진표 (${currentGender === '남' ? '남자부' : '여자부'})`;
            printParticipants.innerText = `출전 인원: ${count}명 (부전승: ${byeCount}명)`;
            bracketStatSummary.innerText = `실제 출전: ${count}명 / 대진표 구성: ${bracketSize}강 (1라운드 부전승: ${byeCount}명)`;

            // Render Tree
            renderBracketVisualization(distributedPlayers, bracketSize);

            // Smooth Scroll
            outputSection.scrollIntoView({ behavior: 'smooth' });
        }

        // Distribute Players and Byes logically so Byes don't match with Byes
        function distributePlayersAndByes(players, size, byeCount) {
            const matchCount = size / 2;
            const tempSlots = new Array(size).fill(null);
            
            // Select which matches have a BYE
            const matchesHaveBye = new Array(matchCount).fill(false);
            if (byeCount > 0) {
                const step = matchCount / byeCount;
                for (let i = 0; i < byeCount; i++) {
                    const matchIndex = Math.floor(i * step);
                    matchesHaveBye[matchIndex] = true;
                }
            }

            let playerIdx = 0;
            // Distribute matches
            for (let m = 0; m < matchCount; m++) {
                if (matchesHaveBye[m]) {
                    // One player, One BYE
                    tempSlots[m * 2] = players[playerIdx++];
                    tempSlots[m * 2 + 1] = { name: "부전승", isBye: true };
                } else {
                    // Two players
                    tempSlots[m * 2] = players[playerIdx++];
                    tempSlots[m * 2 + 1] = players[playerIdx++];
                }
            }

            return tempSlots;
        }

        // Visual Bracket Generator using modern HTML structured design
        function renderBracketVisualization(initialSlots, size) {
            bracketVisualizationContainer.innerHTML = "";
            const roundsCount = Math.log2(size);
            
            // Outer Wrapper
            const bracketWrapper = document.createElement('div');
            bracketWrapper.className = "flex items-stretch justify-between w-full py-4 gap-6";

            let currentRoundPlayers = [...initialSlots];

            for (let r = 0; r <= roundsCount; r++) {
                const roundCol = document.createElement('div');
                roundCol.className = "flex-1 flex flex-col justify-around min-w-[180px] py-2 relative";
                
                // Head labels
                const roundHeader = document.createElement('div');
                roundHeader.className = "text-center font-extrabold text-xs tracking-wider text-slate-400 uppercase mb-4 no-print";
                
                if (r === roundsCount) {
                    roundHeader.innerHTML = `<span class="bg-amber-100 text-amber-800 px-3 py-1 rounded-full border border-amber-300">👑 최종 우승자</span>`;
                } else if (r === roundsCount - 1) {
                    roundHeader.innerText = "결승전";
                } else if (r === roundsCount - 2) {
                    roundHeader.innerText = "준결승 (4강)";
                } else {
                    roundHeader.innerText = `${size / Math.pow(2, r)}강전`;
                }
                roundCol.appendChild(roundHeader);

                // Draw Cards
                const slotsCount = currentRoundPlayers.length;
                for (let i = 0; i < slotsCount; i++) {
                    const item = currentRoundPlayers[i];
                    const slotNode = document.createElement('div');
                    slotNode.className = "my-4 flex flex-col justify-center items-center relative w-full";

                    const card = document.createElement('div');
                    
                    if (item && item.isBye) {
                        card.className = "w-full bg-slate-100 text-slate-400 border border-slate-200 rounded-xl p-3 text-xs text-center font-semibold italic flex items-center justify-center gap-1 shadow-inner";
                        card.innerHTML = `<i data-lucide="sparkles" class="w-3.5 h-3.5 text-slate-400"></i>부전승`;
                    } else if (item) {
                        card.className = "w-full bg-white text-slate-800 border-2 border-slate-200 rounded-xl p-3 text-xs shadow-sm flex items-center justify-between hover:border-indigo-400 transition-all";
                        
                        const numBadge = item.num ? `<span class="bg-indigo-50 text-indigo-600 rounded px-1.5 py-0.5 text-[10px] font-extrabold mr-1.5">${item.num}번</span>` : '';
                        card.innerHTML = `
                            <div class="flex items-center truncate">
                                ${numBadge}
                                <span class="font-bold text-slate-800 text-sm truncate">${item.name}</span>
                            </div>
                        `;
                    } else {
                        card.className = "w-full bg-slate-50/50 text-slate-300 border border-dashed border-slate-200 rounded-xl p-3 text-xs text-center font-medium";
                        card.innerText = "대기선수";
                    }

                    slotNode.appendChild(card);
                    roundCol.appendChild(slotNode);
                }

                bracketWrapper.appendChild(roundCol);

                // Setup players for next round (Auto advancement for Byes)
                if (r < roundsCount) {
                    const nextRoundSize = currentRoundPlayers.length / 2;
                    const nextRoundList = [];
                    for (let n = 0; n < nextRoundSize; n++) {
                        const p1 = currentRoundPlayers[n * 2];
                        const p2 = currentRoundPlayers[n * 2 + 1];

                        if (p1 && p1.isBye && p2 && !p2.isBye) {
                            nextRoundList.push(p2);
                        } else if (p2 && p2.isBye && p1 && !p1.isBye) {
                            nextRoundList.push(p1);
                        } else {
                            nextRoundList.push(null); // Place empty for future manual update or visual tree
                        }
                    }
                    currentRoundPlayers = nextRoundList;
                }
            }

            bracketVisualizationContainer.appendChild(bracketWrapper);
            
            // Re-render Lucide Icons dynamically
            lucide.createIcons();
        }
    </script>
